<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Powered Translate App">
    <meta name="author" content="Peter Paing">
    <title>PollyGlot AI translate app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>

        <img src="images/logo.png" alt="logo">

        <div>
            <h1>PollyGlot</h1>
            <p>Perfect Translation Every Time</p>
            </div>
        </header>
        <main>
        <form>
        <label for="input-text">Text to translate</label>
        <textarea
            id="input-text"
            placeholder="How are you?"
            required
        ></textarea>

        <h2>Select language</h2>

        <label>
            <input type="radio" name="language" value="french" required>
            French
            <img src="images/france-flag.png" alt="France flag">
        </label>

        <label>
            <input type="radio" name="language" value="spanish">
            Spanish
            <img src="images/spain-flag.png" alt="Spain flag">
        </label>

        <label>
            <input type="radio" name="language" value="japanese">
            Japanese
            <img src="images/japan-flag.png" alt="Japan flag">
        </label>

        <button type="submit">Translate</button>
    </form>
    </main>
    </body>
    </html>
